<section class="explore-section">
  <div class="container">
    <div class="section-label">منتجاتنا</div>
    <div class="section-header">
      <h2 class="section-title" style="margin-bottom:0">استكشف منتجاتنا</h2>
      <div class="nav-arrows" style="margin-right:auto">
        <button><i class="fas fa-arrow-right"></i></button>
        <button><i class="fas fa-arrow-left"></i></button>
      </div>
    </div>
    <div class="products-grid">
      <div class="product-card" *ngFor="let p of products">
        <div class="image-wrap">
          <span class="badge" [class.new]="p.badgeType==='new'" *ngIf="p.badge">{{p.badge}}</span>
          <img [src]="p.image" [alt]="p.nameAr" />
          <div class="actions">
            <button><i class="fas fa-heart"></i></button>
            <button><i class="fas fa-eye"></i></button>
          </div>
          <button class="add-to-cart" [routerLink]="['/product', p.id]">إضافة للسلة</button>
        </div>
        <div class="info">
          <p class="name">{{ p.nameAr }}</p>
          <div class="price"><span class="new">${{p.price}}</span><span class="old" *ngIf="p.oldPrice">${{p.oldPrice}}</span></div>
          <div class="colors" *ngIf="p.colors?.length">
            <span class="swatch" *ngFor="let c of p.colors" [style.background]="c"></span>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;margin-top:40px">
      <button routerLink="/products" class="btn-primary">عرض جميع المنتجات</button>
    </div>
  </div>
</section>
