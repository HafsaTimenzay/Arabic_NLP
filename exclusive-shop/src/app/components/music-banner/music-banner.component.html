<section class="music-banner">
  <div class="container banner-inner">
    <div class="banner-content">
      <p class="cat-tag">فئات المنتجات</p>
      <h2>عزز تجربتك<br>الموسيقية</h2>
      <div class="countdown">
        <div class="time-unit"><span class="value">{{ pad(hours) }}</span><span class="label">ساعة</span></div>
        <div class="time-unit"><span class="value">{{ pad(minutes) }}</span><span class="label">دقيقة</span></div>
        <div class="time-unit"><span class="value">{{ pad(seconds) }}</span><span class="label">ثانية</span></div>
      </div>
      <a href="#" class="btn-green">اشتري الآن!</a>
    </div>
    <div class="banner-image">
      <img src="https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=500&q=80" alt="سماعات JBL" />
    </div>
  </div>
</section>
